<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>在庫・店舗使用数 管理システム（部門別）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: sans-serif;
      margin: 10px;
      padding: 0;
      font-size: 16px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    .input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    select,
    input[type="text"],
    input[type="number"],
    button {
      font-size: 16px;
      padding: 10px;
      margin: 0;
      max-width: 180px;
      flex: 1 1 auto;
      box-sizing: border-box;
    }

    button {
      max-width: 120px;
      cursor: pointer;
      border: 1px solid #999;
      background-color: #f5f5f5;
      border-radius: 4px;
    }

    button:hover {
      background-color: #e8e8e8;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .copy-button {
      max-width: 140px;
      font-size: 14px;
      padding: 8px 12px;
    }

    .table-container {
      overflow-x: auto;
      margin-bottom: 30px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 600px;
    }

    th,
    td {
      border: 1px solid #aaa;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    td input {
      width: 80px;
      text-align: center;
      font-size: 16px;
      padding: 6px;
      box-sizing: border-box;
    }

    .delete-button {
      max-width: 80px;
      font-size: 14px;
      padding: 6px 10px;
    }

    .empty-message {
      color: #666;
      margin: 10px 0;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 20px;
      }

      th,
      td {
        font-size: 14px;
        padding: 6px;
      }

      td input {
        width: 60px;
        font-size: 14px;
      }

      select,
      input[type="text"],
      input[type="number"],
      button {
        max-width: 100%;
        flex-basis: 100%;
      }

      .input-container {
        gap: 8px;
      }

      .section-header {
        flex-direction: column;
        align-items: stretch;
      }

      .copy-button {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <h1>在庫・店舗使用数 管理システム（部門別）</h1>

  <div class="input-container">
    <select id="departmentSelect" aria-label="部門選択">
      <option value="パック">パック</option>
      <option value="食材">食材</option>
    </select>

    <input type="text" id="itemName" placeholder="商品名" aria-label="商品名" />

    <input
      type="number"
      id="warehouseStock"
      placeholder="倉庫在庫"
      min="0"
      step="50"
      aria-label="倉庫在庫"
    />

    <input
      type="number"
      id="storeUsed"
      placeholder="店舗使用数"
      min="0"
      step="1"
      aria-label="店舗使用数"
    />

    <button id="addButton">追加</button>
  </div>

  <div id="tablesArea"></div>

  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC...",
      authDomain: "zaikokannri-sakaihigashi.firebaseapp.com",
      databaseURL: "https://zaikokannri-sakaihigashi-default-rtdb.firebaseio.com",
      projectId: "zaikokannri-sakaihigashi",
      storageBucket: "zaikokannri-sakaihigashi.appspot.com",
      messagingSenderId: "92310858947",
      appId: "1:92310858947:web:f6d6e1e537d87c2608676",
      measurementId: "G-W7QESLYW06"
    };

    firebase.initializeApp(firebaseConfig);

    const database = firebase.database();
    const inventoryRef = database.ref("sakaihigashi");

    const departmentSelect = document.getElementById("departmentSelect");
    const itemNameInput = document.getElementById("itemName");
    const warehouseStockInput = document.getElementById("warehouseStock");
    const storeUsedInput = document.getElementById("storeUsed");
    const addButton = document.getElementById("addButton");
    const tablesArea = document.getElementById("tablesArea");

    inventoryRef.on("value", snapshot => {
      const firebaseData = snapshot.val() || {};

      const inventory = Object.keys(firebaseData).map(key => ({
        key,
        department: firebaseData[key].department || "",
        name: firebaseData[key].name || "",
        warehouse: Number(firebaseData[key].warehouse) || 0,
        used: Number(firebaseData[key].used) || 0
      }));

      renderTables(inventory);
    });

    function addItem() {
      const department = departmentSelect.value;
      const name = itemNameInput.value.trim();
      const warehouse = Number(warehouseStockInput.value);
      const used = Number(storeUsedInput.value);

      if (!name) {
        alert("商品名を入力してください。");
        return;
      }

      if (isNaN(warehouse) || warehouse < 0) {
        alert("倉庫在庫は0以上の数値を入力してください。");
        return;
      }

      if (isNaN(used) || used < 0) {
        alert("店舗使用数は0以上の数値を入力してください。");
        return;
      }

      inventoryRef.push({
        department,
        name,
        warehouse,
        used
      }).then(() => {
        itemNameInput.value = "";
        warehouseStockInput.value = "";
        storeUsedInput.value = "";
        itemNameInput.focus();
      }).catch(error => {
        alert("追加に失敗しました。");
        console.error(error);
      });
    }

    function updateValue(key, field, value) {
      const num = Number(value);

      if (!isNaN(num) && num >= 0) {
        inventoryRef.child(key).update({
          [field]: num
        }).catch(error => {
          alert("更新に失敗しました。");
          console.error(error);
        });
      } else {
        alert("0以上の数値を入力してください。");
      }
    }

    function removeItem(key) {
      if (confirm("この商品を削除しますか？")) {
        inventoryRef.child(key).remove().catch(error => {
          alert("削除に失敗しました。");
          console.error(error);
        });
      }
    }

    function getRemaining(item) {
      return item.warehouse + item.used;
    }

    function formatRemaining(item) {
      const remaining = getRemaining(item);

      if (item.department === "食材") {
        return remaining.toFixed(1);
      }

      return String(remaining);
    }

    function copyRemainingList(department, items) {
      if (items.length === 0) {
        alert("コピーする商品がありません。");
        return;
      }

      let copyItems = items;

      // 食材だけ、最後の1行をコピー対象から外す
      if (department === "食材") {
        copyItems = items.slice(0, -1);
      }

      if (copyItems.length === 0) {
        alert("コピーする商品がありません。");
        return;
      }

      const copyText = copyItems
        .map(item => formatRemaining(item))
        .join("\n");

      copyTextToClipboard(copyText)
        .then(() => {
          alert(`${department}の残数をコピーしました。`);
        })
        .catch(() => {
          alert("コピーに失敗しました。");
        });
    }

    function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }

      return new Promise((resolve, reject) => {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "-9999px";

        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
          const successful = document.execCommand("copy");
          document.body.removeChild(textarea);

          if (successful) {
            resolve();
          } else {
            reject();
          }
        } catch (error) {
          document.body.removeChild(textarea);
          reject(error);
        }
      });
    }

    function renderTables(inventory) {
      tablesArea.innerHTML = "";

      const departments = ["パック", "食材"];

      departments.forEach(dept => {
        const deptItems = inventory.filter(item => item.department === dept);

        const sectionHeader = document.createElement("div");
        sectionHeader.className = "section-header";

        const h2 = document.createElement("h2");
        h2.textContent = dept;

        const copyButton = document.createElement("button");
        copyButton.textContent = "残数コピー";
        copyButton.className = "copy-button";
        copyButton.addEventListener("click", () => {
          copyRemainingList(dept, deptItems);
        });

        sectionHeader.appendChild(h2);
        sectionHeader.appendChild(copyButton);
        tablesArea.appendChild(sectionHeader);

        if (deptItems.length === 0) {
          const emptyMessage = document.createElement("p");
          emptyMessage.className = "empty-message";
          emptyMessage.textContent = "登録されている商品はありません。";
          tablesArea.appendChild(emptyMessage);
          return;
        }

        const tableDiv = document.createElement("div");
        tableDiv.className = "table-container";

        const table = document.createElement("table");

        const thead = document.createElement("thead");
        thead.innerHTML = `
          <tr>
            <th>商品名</th>
            <th>倉庫在庫</th>
            <th>店舗使用数</th>
            <th>残数（在庫＋使用）</th>
            <th>操作</th>
          </tr>
        `;
        table.appendChild(thead);

        const tbody = document.createElement("tbody");

        deptItems.forEach(item => {
          const warehouseStep = item.department === "食材" ? 1 : 50;
          const usedStep = item.department === "食材" ? 0.1 : 1;

          const tr = document.createElement("tr");

          const nameTd = document.createElement("td");
          nameTd.textContent = item.name;

          const warehouseTd = document.createElement("td");
          const warehouseInput = document.createElement("input");
          warehouseInput.type = "number";
          warehouseInput.min = "0";
          warehouseInput.step = warehouseStep;
          warehouseInput.value = item.warehouse;
          warehouseInput.addEventListener("change", () => {
            updateValue(item.key, "warehouse", warehouseInput.value);
          });
          warehouseTd.appendChild(warehouseInput);

          const usedTd = document.createElement("td");
          const usedInput = document.createElement("input");
          usedInput.type = "number";
          usedInput.min = "0";
          usedInput.step = usedStep;
          usedInput.value = item.used;
          usedInput.addEventListener("change", () => {
            updateValue(item.key, "used", usedInput.value);
          });
          usedTd.appendChild(usedInput);

          const remainingTd = document.createElement("td");
          remainingTd.textContent = formatRemaining(item);

          const operationTd = document.createElement("td");
          const deleteButton = document.createElement("button");
          deleteButton.textContent = "削除";
          deleteButton.className = "delete-button";
          deleteButton.addEventListener("click", () => {
            removeItem(item.key);
          });
          operationTd.appendChild(deleteButton);

          tr.appendChild(nameTd);
          tr.appendChild(warehouseTd);
          tr.appendChild(usedTd);
          tr.appendChild(remainingTd);
          tr.appendChild(operationTd);

          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        tableDiv.appendChild(table);
        tablesArea.appendChild(tableDiv);
      });
    }

    function updateInputStepByDepartment() {
      const department = departmentSelect.value;

      if (department === "食材") {
        warehouseStockInput.step = "1";
        storeUsedInput.step = "0.1";
      } else {
        warehouseStockInput.step = "50";
        storeUsedInput.step = "1";
      }
    }

    addButton.addEventListener("click", addItem);
    departmentSelect.addEventListener("change", updateInputStepByDepartment);

    departmentSelect.addEventListener("keydown", e => {
      if (e.key === "Enter") itemNameInput.focus();
    });

    itemNameInput.addEventListener("keydown", e => {
      if (e.key === "Enter") warehouseStockInput.focus();
    });

    warehouseStockInput.addEventListener("keydown", e => {
      if (e.key === "Enter") storeUsedInput.focus();
    });

    storeUsedInput.addEventListener("keydown", e => {
      if (e.key === "Enter") addButton.click();
    });

    updateInputStepByDepartment();
  </script>

</body>
</html>
